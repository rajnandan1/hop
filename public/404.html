<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="color-scheme" content="light">
<meta name="theme-color" content="#faf9f6">
<title>No link here · hop</title>
<meta name="description" content="No short link lives at this address.">
<link rel="icon" href="hop-mark.svg" type="image/svg+xml">
<style>
  :root {
    --ground:      oklch(0.992 0.004 80);
    --surface:     oklch(1 0 0);
    --ink:         oklch(0.235 0.012 60);
    --ink-2:       oklch(0.435 0.018 55);
    --ink-3:       oklch(0.555 0.020 55);
    --line:        oklch(0.905 0.006 75);
    --line-2:      oklch(0.845 0.009 70);
    --accent:      oklch(0.700 0.180 47);
    --accent-text: oklch(0.540 0.160 44);
    --accent-soft: oklch(0.957 0.034 62);
    --accent-line: oklch(0.820 0.110 55);
    --sans: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    --mono: ui-monospace, "SF Mono", "JetBrains Mono", "Cascadia Code", Menlo, Consolas, monospace;
    --r-pill: 999px; --r-md: 12px;
    --ease-out: cubic-bezier(.22,1,.36,1);
    --shadow-sm: 0 1px 2px rgba(48,36,24,.05), 0 1px 1px rgba(48,36,24,.04);
    --shadow-md: 0 2px 4px rgba(48,36,24,.05), 0 12px 28px -10px rgba(48,36,24,.16);
    --shadow-accent: 0 10px 30px -12px oklch(0.700 0.180 47 / .45);
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; min-height: 100vh; min-height: 100svh;
    display: grid; grid-template-rows: auto 1fr;
    background: var(--ground); color: var(--ink);
    font-family: var(--sans); font-size: 1rem; line-height: 1.6;
    -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale;
  }
  a { color: inherit; }
  code { font-family: var(--mono); }
  :focus-visible { outline: 2.5px solid var(--accent-text); outline-offset: 3px; border-radius: 4px; }
  .wrap { width: 100%; max-width: 64rem; margin-inline: auto; padding-inline: clamp(1.25rem, 5vw, 2.5rem); }

  header { position: sticky; top: 0; }
  .hdr { display: flex; align-items: center; justify-content: space-between; height: 4rem; }
  .brand { display: inline-flex; align-items: center; gap: .55rem; font-weight: 800; font-size: 1.18rem; letter-spacing: -0.03em; text-decoration: none; color: var(--ink); }
  .mark { width: 1.4em; height: 1.4em; flex: none; }
  .mark .hm-line { fill: none; stroke: var(--accent); stroke-width: 2.3; stroke-linecap: round; stroke-linejoin: round; }
  .mark .hm-dot  { fill: var(--accent); }
  .ghlink { display: inline-flex; align-items: center; gap: .5rem; font-size: .92rem; font-weight: 600; color: var(--ink-2); text-decoration: none; padding: .5rem .7rem; border-radius: var(--r-pill); transition: color .15s ease, background .15s ease; }
  .ghlink svg { width: 1.05rem; height: 1.05rem; }
  .ghlink:hover { color: var(--ink); background: color-mix(in oklab, var(--ink) 6%, transparent); }

  main { display: grid; place-items: center; padding-block: clamp(2rem, 7vw, 5rem) clamp(3rem, 9vw, 6rem); position: relative; overflow: hidden; }
  main::before {
    content: ""; position: absolute; inset: 0; z-index: 0; pointer-events: none;
    background-image: radial-gradient(var(--line-2) 1.1px, transparent 1.1px); background-size: 26px 26px; opacity: .5;
    -webkit-mask-image: radial-gradient(110% 80% at 50% 40%, #000 25%, transparent 72%);
            mask-image: radial-gradient(110% 80% at 50% 40%, #000 25%, transparent 72%);
  }
  .panel { position: relative; z-index: 1; max-width: 34rem; text-align: center; display: grid; justify-items: center; }

  /* "slug points nowhere" motif */
  .deadend { display: flex; align-items: center; gap: .25rem; margin-bottom: clamp(1.75rem, 4vw, 2.5rem); }
  .deadend .chip {
    font-family: var(--mono); font-size: .92rem; font-weight: 600;
    padding: .42rem .65rem; border-radius: var(--r-pill);
    background: var(--surface); border: 1.5px solid var(--accent); color: var(--ink); box-shadow: var(--shadow-md);
  }
  .deadend .seg { width: clamp(28px, 9vw, 56px); height: 2px; border-radius: 2px; background: repeating-linear-gradient(90deg, var(--line-2) 0 7px, transparent 7px 13px); }
  .deadend .void {
    width: 2.6rem; height: 2.6rem; border-radius: var(--r-md); display: grid; place-items: center;
    background: var(--surface); border: 1.5px dashed var(--line-2); color: var(--ink-3);
  }
  .deadend .void svg { width: 50%; height: 50%; }

  .eyebrow { font-family: var(--mono); font-size: .82rem; font-weight: 500; letter-spacing: .04em; color: var(--accent-text); }
  h1 { margin: .5rem 0 0; font-size: clamp(2rem, 1.4rem + 3vw, 2.85rem); line-height: 1.08; letter-spacing: -0.03em; font-weight: 820; text-wrap: balance; }
  p { margin: 1rem 0 0; color: var(--ink-2); max-width: 42ch; }
  p code { font-size: .9em; background: color-mix(in oklab, var(--ink) 6%, transparent); padding: .08em .35em; border-radius: 5px; color: var(--ink); }

  .actions { display: flex; flex-wrap: wrap; gap: .75rem; justify-content: center; margin-top: 2rem; }
  .btn { display: inline-flex; align-items: center; gap: .5rem; padding: .72rem 1.15rem; border-radius: var(--r-pill); font-weight: 650; font-size: 1rem; line-height: 1; letter-spacing: -0.01em; text-decoration: none; border: 1.5px solid transparent; transition: transform .18s var(--ease-out), box-shadow .2s var(--ease-out), background .15s ease, border-color .15s ease; }
  .btn__arrow { transition: transform .25s var(--ease-out); }
  .btn:hover .btn__arrow { transform: translateX(3px); }
  .btn--primary { background: var(--accent); color: oklch(0.20 0.04 50); box-shadow: var(--shadow-accent); }
  .btn--primary:hover { background: oklch(0.725 0.180 50); transform: translateY(-1px); }
  .btn--ghost { background: var(--surface); color: var(--ink); border-color: var(--line-2); box-shadow: var(--shadow-sm); }
  .btn--ghost:hover { border-color: var(--accent-line); transform: translateY(-1px); box-shadow: var(--shadow-md); }

  @media (prefers-reduced-motion: reduce) { * { transition: none !important; } .btn:hover { transform: none; } }
</style>
</head>
<body>
  <header>
    <div class="wrap hdr">
      <a class="brand" href="./" aria-label="hop — home">
        <svg class="mark" viewBox="0 0 24 24" aria-hidden="true">
          <circle class="hm-dot" cx="4" cy="18.2" r="2.4"/>
          <path class="hm-line" d="M5 17.3 C 9 6.8, 15.3 9.3, 16.9 10.9"/>
          <path class="hm-dot" d="M20.2 14.1 L 14.9 12.7 L 18.6 8.9 Z"/>
        </svg>
        hop
      </a>
      <a class="ghlink" href="{{REPO_URL}}">
        <svg viewBox="0 0 16 16" aria-hidden="true" fill="currentColor"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0 0 16 8c0-4.42-3.58-8-8-8Z"/></svg>
        View source
      </a>
    </div>
  </header>

  <main>
    <div class="wrap panel">
      <div class="deadend" aria-hidden="true">
        <span class="chip">/your-slug</span>
        <span class="seg"></span>
        <span class="void">
          <svg viewBox="0 0 24 24" fill="none"><path d="M7 7l10 10M17 7L7 17" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/></svg>
        </span>
      </div>
      <span class="eyebrow">404 · not found</span>
      <h1>No Link lives here.</h1>
      <p>This Slug has no Target URL — it may have been deleted, or it was never created. Every short link starts the same way: by opening an issue.</p>
      <div class="actions">
        <a class="btn btn--primary" href="{{NEW_ISSUE_URL}}">Create a link <svg class="btn__arrow" width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true"><path d="M2 8h11M9 4l4 4-4 4" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></a>
        <a class="btn btn--ghost" href="./">Back home</a>
      </div>
    </div>
  </main>
</body>
</html>
