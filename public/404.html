<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Link not found · hop</title>
<style>
  :root { color-scheme: light dark; }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100vh;
    display: grid;
    place-items: center;
    padding: 2rem;
    font: 16px/1.6 ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    background: #fafafa;
    color: #18181b;
  }
  @media (prefers-color-scheme: dark) {
    body { background: #0b0b0c; color: #e4e4e7; }
    .card { background: #131316; border-color: #27272a; }
  }
  .card {
    max-width: 32rem;
    width: 100%;
    text-align: center;
    background: #fff;
    border: 1px solid #e4e4e7;
    border-radius: 16px;
    padding: 2.5rem;
  }
  h1 { margin: 0 0 .25rem; font-size: 3rem; letter-spacing: -0.03em; }
  p { margin: 0 0 1rem; opacity: .75; }
  a.btn {
    display: inline-block;
    margin-top: .5rem;
    padding: .6rem 1.1rem;
    border-radius: 10px;
    background: #18181b;
    color: #fafafa;
    text-decoration: none;
    font-weight: 600;
  }
  @media (prefers-color-scheme: dark) { a.btn { background: #e4e4e7; color: #18181b; } }
</style>
</head>
<body>
<main class="card">
  <h1>404</h1>
  <p>No short link lives here.</p>
  <a class="btn" href="{{NEW_ISSUE_URL}}">Create a link →</a>
</main>
</body>
</html>
