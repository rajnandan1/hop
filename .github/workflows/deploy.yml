name: Deploy site

on:
  # Human edits to the data/site sources. (A GITHUB_TOKEN commit from link.yml
  # does NOT trigger this — link.yml dispatches it explicitly instead.)
  push:
    branches: [main]
    paths:
      - urls.json
      - public/**
      - scripts/**
      - CNAME
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Pages allows one in-flight deployment; cancel superseded builds.
concurrency:
  group: hop-pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v5

      # GITHUB_TOKEN can't enable Pages (that needs admin rights it never has, and
      # GitHub retired the gh-pages auto-enable worker in 2024). So fail fast with
      # a clear, actionable message instead of the action's cryptic "Not Found".
      - name: Ensure Pages is enabled
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        run: |
          if gh api "repos/$REPO/pages" --silent 2>/dev/null; then
            echo "GitHub Pages is enabled — continuing."
            exit 0
          fi
          {
            echo "## ⚠️ GitHub Pages isn't turned on yet"
            echo ""
            echo "Enable it once (GitHub doesn't allow a workflow to do this for you):"
            echo ""
            echo "1. Open **Settings → Pages**."
            echo "2. Under **Build and deployment**, set **Source** to **GitHub Actions**."
            echo "3. Re-run this workflow: **Actions → Deploy site → Run workflow**."
          } >> "$GITHUB_STEP_SUMMARY"
          echo "::error title=GitHub Pages not enabled::Open Settings → Pages and set Source to 'GitHub Actions', then re-run this workflow. Full steps are in the job summary."
          exit 1

      - uses: actions/setup-node@v5
        with:
          node-version: '22'

      - name: Build site from urls.json
        run: node scripts/build-site.js

      - uses: actions/configure-pages@v6

      - uses: actions/upload-pages-artifact@v5
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v5
