name: Deploy site

on:
  # Human edits to the data/site sources. (A GITHUB_TOKEN commit from link.yml
  # does NOT trigger this — link.yml dispatches it explicitly instead.)
  push:
    branches: [main]
    paths:
      - urls.json
      - public/**
      - scripts/**
      - CNAME
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Pages allows one in-flight deployment; cancel superseded builds.
concurrency:
  group: hop-pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Build site from urls.json
        run: node scripts/build-site.js

      - uses: actions/configure-pages@v5
        with:
          enablement: true

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
